name: Publish calendar

on:
  schedule:
    # 05:00, 11:00, 17:00, 23:00 Europe/Lisbon (WEST, UTC+1) — 04:00, 10:00, 16:00, 22:00 UTC
    - cron: "0 4,10,16,22 * * *"
  workflow_dispatch:

concurrency:
  group: airbnb-chrome-profile
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      AIRBNB_EMAIL: ${{ secrets.AIRBNB_EMAIL }}
      AIRBNB_PASSWORD: ${{ secrets.AIRBNB_PASSWORD }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore venv
        uses: actions/cache/restore@v4
        id: venv-cache
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            playwright-chrome-${{ runner.os }}-

      - name: Install Python dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .

      - name: Install Playwright Chrome
        run: .venv/bin/playwright install chrome

      - name: Save venv
        if: steps.venv-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}

      - name: Save Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Restore Chrome profile
        uses: actions/cache/restore@v4
        id: chrome-profile
        with:
          path: profiles/calendar-airbnb
          key: airbnb-chrome-profile-${{ github.run_id }}
          restore-keys: |
            airbnb-chrome-profile-

      - name: Fetch bookings and build calendar HTML
        run: ./calendar.sh --year "$(date -u +%Y)"

      - name: Publish calendar to GitHub Pages
        run: |
          YEAR="$(date -u +%Y)"
          cp "calendars/templates/calendar-${YEAR}.html" docs/index.html
          touch docs/.nojekyll

      - name: Commit and push calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/bookings-snapshot.json docs/.nojekyll
          if git diff --staged --quiet; then
            echo "Calendar unchanged; skipping commit."
          else
            git commit -m "Update calendar"
            git push
          fi

      - name: Verify GitHub Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"

          pages_status="$(gh api "repos/${repo}/pages" --jq .status)"
          build_status="$(gh api "repos/${repo}/pages/builds/latest" --jq .status)"
          echo "Pages status: ${pages_status}, latest build: ${build_status}"

          if [ "${pages_status}" = "errored" ] || [ "${build_status}" = "errored" ]; then
            echo "Pages deployment errored; requesting rebuild..."
            gh api -X POST "repos/${repo}/pages/builds" >/dev/null
          fi

          for _ in $(seq 1 60); do
            pages_status="$(gh api "repos/${repo}/pages" --jq .status)"
            build_status="$(gh api "repos/${repo}/pages/builds/latest" --jq .status)"
            echo "Pages status: ${pages_status}, latest build: ${build_status}"

            if [ "${pages_status}" = "built" ] && [ "${build_status}" = "built" ]; then
              echo "GitHub Pages deployment verified."
              exit 0
            fi

            if [ "${build_status}" = "errored" ]; then
              echo "::error::GitHub Pages build failed."
              exit 1
            fi

            sleep 10
          done

          echo "::error::Timed out waiting for GitHub Pages deployment."
          exit 1

      - name: Save Chrome profile
        if: success()
        uses: actions/cache/save@v4
        with:
          path: profiles/calendar-airbnb
          key: airbnb-chrome-profile-${{ github.run_id }}

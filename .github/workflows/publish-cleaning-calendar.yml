name: Publish cleaning calendar

on:
  schedule:
    # 11:00 and 23:00 Europe/Lisbon (WEST, UTC+1) — 10:00 and 22:00 UTC
    - cron: "0 10,22 * * *"
  workflow_dispatch:

concurrency:
  group: airbnb-chrome-profile
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      AIRBNB_EMAIL: ${{ secrets.AIRBNB_EMAIL }}
      AIRBNB_PASSWORD: ${{ secrets.AIRBNB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
          .venv/bin/playwright install chrome

      - name: Restore Chrome profile
        uses: actions/cache/restore@v4
        id: chrome-profile
        with:
          path: profiles/calendar-airbnb
          key: airbnb-chrome-profile-${{ github.run_id }}
          restore-keys: |
            airbnb-chrome-profile-

      - name: Fetch bookings and build calendar HTML
        run: ./cleanings.sh --year "$(date -u +%Y)"

      - name: Publish calendar to GitHub Pages
        run: |
          YEAR="$(date -u +%Y)"
          cp "cleanings/templates/cleanings-${YEAR}.html" docs/index.html

      - name: Commit and push calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "Calendar unchanged; skipping commit."
          else
            git commit -m "Update cleaning calendar"
            git push
          fi

      - name: Save Chrome profile
        if: success()
        uses: actions/cache/save@v4
        with:
          path: profiles/calendar-airbnb
          key: airbnb-chrome-profile-${{ github.run_id }}
